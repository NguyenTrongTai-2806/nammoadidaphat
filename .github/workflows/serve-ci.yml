name: Spark Batch CI/CD

on:
  push:
    branches:
      - main
    # Chỉ trigger CI/CD khi có thay đổi code trong thư mục spark
    paths:
      - 'serving/**' 
      - '.github/workflows/serve-ci.yml'

env:
  PROJECT_ID: bigdata-k8s-project
  REGION: asia-southeast1
  REPO_NAME: bigdata-repo
  IMAGE_NAME: serving-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCP
      run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        # Dùng mã hash của commit (7 chữ số) làm version tag thay vì gõ tay :v1, :v2
        IMAGE_TAG=${GITHUB_SHA::7}
        FULL_IMAGE_PATH=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$IMAGE_NAME

        echo "Đang build image: $FULL_IMAGE_PATH:$IMAGE_TAG"
        
        # Build image từ Dockerfile.serving nằm trong thư mục serving
        docker build -t $FULL_IMAGE_PATH:latest -t $FULL_IMAGE_PATH:$IMAGE_TAG -f serving/Dockerfile.serving serving/

        echo "Đang push image lên Artifact Registry..."
        docker push $FULL_IMAGE_PATH --all-tags